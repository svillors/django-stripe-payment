{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <title>{{ item.name }}</title>
    <script src="https://js.stripe.com/v3/"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'payments/css/styles.css' %}">
</head>
<body class="page-detail">
    <div class="card">
        <div class="corner-mark"></div>
        <div class="card-header">
            <span class="card-label">Товар</span>
            <h1 class="item-name">{{ item.name }}</h1>
        </div>
        <div class="card-body">
            <p class="item-description">{{ item.description }}</p>
            <div class="divider"></div>
            <div class="price-row">
                <span class="price-label">Цена</span>
                <span class="price-value">{{ item.price }}</span>
                <span class="price-currency">{{ item.currency }}</span>
            </div>
        </div>
        <div class="card-footer">
            <button class="buy-button" id="buy-button">
                <span>Купить сейчас</span>
            </button>
            <p class="secure-note">🔒 Безопасная оплата через Stripe</p>
        </div>
    </div>

    <script>
        const btn = document.getElementById('buy-button');

        btn.addEventListener('click', () => {
            btn.classList.add('loading');
            btn.disabled = true;

            window.location.href = "{% url 'checkout_item' item.id %}";
        });
    </script>
</body>
</html>
